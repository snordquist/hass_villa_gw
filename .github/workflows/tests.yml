name: CI - Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    name: HA Hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Ignore checks that depend on GitHub repo metadata (description,
          # topics) and on home-assistant/brands (icons). These are set
          # outside the code and don't affect functional correctness.
          ignore: brands topics

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Syntax smoke test
        run: |
          python - <<'PY'
          import ast, pathlib
          for p in pathlib.Path("custom_components/villa_gw").rglob("*.py"):
              ast.parse(p.read_text())
              print("ok:", p)
          PY

      - name: Pytest (log-line parser)
        run: |
          python -m pytest tests/ -v
